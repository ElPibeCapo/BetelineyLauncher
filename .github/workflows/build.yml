name: Build BetelineyLauncher

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  #  LINUX (Ubuntu 24.04)
  # ─────────────────────────────────────────
  build-linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build extra-cmake-modules \
            qt6-base-dev qt6-base-private-dev \
            libqt6networkauth6-dev libqt6svg6-dev \
            libarchive-dev libcmark-dev libqrencode-dev \
            zlib1g-dev default-jdk-headless appstream \
            libgl-dev libgles-dev gettext libgamemode-dev
          sudo apt-get install -y libtomlplusplus-dev 2>/dev/null || \
          sudo apt-get install -y libtomlplusplus3-dev 2>/dev/null || \
          echo "tomlplusplus no disponible via apt — CMake usara fallback"

      - name: Fix cmark cmake config (CMake 4.x)
        run: |
          CMARK_LIB=$(find /usr/lib /usr/lib/x86_64-linux-gnu -name "libcmark.so*" 2>/dev/null | grep -v debug | head -1)
          CMARK_H=$(find /usr/include -name "cmark.h" 2>/dev/null | head -1)
          CMARK_INC=${CMARK_H:+$(dirname "$CMARK_H")}
          CMARK_INC=${CMARK_INC:-/usr/include}
          echo "CMARK_LIB=$CMARK_LIB  CMARK_INC=$CMARK_INC"
          mkdir -p /tmp/cmark_fix
          python3 - "$CMARK_LIB" "$CMARK_INC" << 'PYEOF'
          import sys
          lib, inc = sys.argv[1], sys.argv[2]
          open('/tmp/cmark_fix/cmark-config.cmake','w').write(
              'if(NOT TARGET cmark::cmark)\n'
              '  add_library(cmark::cmark SHARED IMPORTED)\n'
              '  set_target_properties(cmark::cmark PROPERTIES\n'
              f'    IMPORTED_LOCATION "{lib}"\n'
              f'    IMPORTED_IMPLIB "{lib}"\n'
              f'    IMPORTED_LOCATION_RELEASE "{lib}"\n'
              f'    IMPORTED_IMPLIB_RELEASE "{lib}"\n'
              f'    INTERFACE_INCLUDE_DIRECTORIES "{inc}"\n'
              '  )\n'
              'endif()\n')
          open('/tmp/cmark_fix/cmark-config-version.cmake','w').write(
              'set(PACKAGE_VERSION "0.31.0")\n'
              'set(PACKAGE_VERSION_COMPATIBLE TRUE)\n'
              'set(PACKAGE_VERSION_EXACT TRUE)\n')
          print(f"cmark fix OK — lib={lib} inc={inc}")
          PYEOF

      - name: Configurar CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -Dcmark_DIR=/tmp/cmark_fix \
            -DLauncher_QT_VERSION_MAJOR=6 \
            -DENABLE_LTO=ON \
            -G Ninja

      - name: Compilar
        run: ninja -C build -j$(nproc)

      - name: Obtener version
        id: ver
        run: |
          VER=$(grep -oP 'Launcher_VERSION_NAME "\K[\d.]+' CMakeLists.txt | head -1)
          ARCH=$(uname -m)
          echo "pkgname=BetelineyLauncher-${VER}-Linux-${ARCH}" >> $GITHUB_OUTPUT
          echo "tarname=BetelineyLauncher-${VER}-Linux-${ARCH}.tar.gz" >> $GITHUB_OUTPUT

      - name: Empaquetar
        run: |
          PKG="${{ steps.ver.outputs.pkgname }}"
          STAGE="dist/stage/$PKG"
          mkdir -p "$STAGE/jars"
          cp build/beteliney "$STAGE/"
          find build/libraries -name "*.jar" -exec cp {} "$STAGE/jars/" \; 2>/dev/null || true
          find build/jars    -name "*.jar" -exec cp {} "$STAGE/jars/" \; 2>/dev/null || true
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\nexec "$DIR/beteliney" "$@"\n' > "$STAGE/run.sh"
          chmod +x "$STAGE/run.sh" "$STAGE/beteliney"
          tar -czf "dist/${{ steps.ver.outputs.tarname }}" -C dist/stage "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/${{ steps.ver.outputs.tarname }}

  # ─────────────────────────────────────────
  #  WINDOWS (Server 2022, MSVC)
  # ─────────────────────────────────────────
  build-windows:
    name: Windows (Server 2022, MSVC)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
        continue-on-error: true

      - name: Instalar Qt 6.6.3
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtnetworkauth qtsvg
          cache: true

      - name: Instalar dependencias (vcpkg manifest)
        run: vcpkg install --triplet x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Configurar CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DLauncher_QT_VERSION_MAJOR=6 `
            -DENABLE_LTO=OFF `
            -G "Visual Studio 17 2022" -A x64

      - name: Compilar
        run: cmake --build build --config Release --parallel

      - name: Obtener version
        id: ver
        shell: pwsh
        run: |
          $ver = (Select-String 'Launcher_VERSION_NAME "(\d[\d.]+)"' CMakeLists.txt | `
            Select-Object -First 1).Matches[0].Groups[1].Value
          echo "pkgname=BetelineyLauncher-${ver}-Windows-x64" >> $env:GITHUB_OUTPUT
          echo "zipname=BetelineyLauncher-${ver}-Windows-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Empaquetar
        shell: pwsh
        run: |
          $PKG = "${{ steps.ver.outputs.pkgname }}"
          $dirs = "platforms","tls","imageformats","iconengines","styles","jars"
          $dirs | ForEach-Object { New-Item -ItemType Directory -Path "dist\$PKG\$_" -Force | Out-Null }
          Copy-Item "build\Release\beteliney.exe" "dist\$PKG\"
          Get-ChildItem build\libraries -Recurse -Filter "*.jar" | `
            Copy-Item -Destination "dist\$PKG\jars\" -ErrorAction SilentlyContinue
          windeployqt --release --no-translations `
            --dir "dist\$PKG" "build\Release\beteliney.exe"
          Compress-Archive -Path "dist\$PKG" -DestinationPath "dist\${{ steps.ver.outputs.zipname }}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/${{ steps.ver.outputs.zipname }}

  # ─────────────────────────────────────────
  #  RELEASE — solo en tags v*.*.*
  # ─────────────────────────────────────────
  release:
    name: Crear Release
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with: { name: linux-build,   path: artifacts/ }
      - uses: actions/download-artifact@v4
        with: { name: windows-build, path: artifacts/ }

      - uses: softprops/action-gh-release@v2
        with:
          name: "BetelineyLauncher ${{ github.ref_name }}"
          body: |
            ## BetelineyLauncher ${{ github.ref_name }}

            | Plataforma | Descarga | Instrucciones |
            |---|---|---|
            | **Windows 10/11** | `.zip` | Extraer → ejecutar `beteliney.exe` |
            | **Linux 64-bit** | `.tar.gz` | Extraer → ejecutar `bash run.sh` |

            Java es gestionado automáticamente por el launcher.
          files: artifacts/*
