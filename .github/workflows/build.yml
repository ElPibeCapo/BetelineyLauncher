name: Build BetelineyLauncher

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  #  LINUX (Ubuntu 24.04)
  # ─────────────────────────────────────────
  build-linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Habilitar universe y instalar dependencias
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build extra-cmake-modules \
            qt6-base-dev qt6-base-private-dev \
            libqt6networkauth6-dev libqt6svg6-dev \
            libarchive-dev libcmark-dev libqrencode-dev \
            zlib1g-dev default-jdk-headless appstream \
            libgl-dev libgles-dev gettext libgamemode-dev
          sudo apt-get install -y libtomlplusplus-dev 2>/dev/null || \
          sudo apt-get install -y libtomlplusplus3-dev 2>/dev/null || \
          echo "tomlplusplus: usara fallback de CMake"

      - name: Fix cmark cmake config (CMake 4.x)
        run: |
          CMARK_LIB=$(find /usr/lib /usr/lib/x86_64-linux-gnu -name "libcmark.so*" 2>/dev/null | grep -v debug | head -1)
          CMARK_H=$(find /usr/include -name "cmark.h" 2>/dev/null | head -1)
          CMARK_INC=${CMARK_H:+$(dirname "$CMARK_H")}
          CMARK_INC=${CMARK_INC:-/usr/include}
          mkdir -p /tmp/cmark_fix
          python3 - "$CMARK_LIB" "$CMARK_INC" << 'PYEOF'
          import sys
          lib, inc = sys.argv[1], sys.argv[2]
          open('/tmp/cmark_fix/cmark-config.cmake','w').write(
              'if(NOT TARGET cmark::cmark)\n'
              '  add_library(cmark::cmark SHARED IMPORTED)\n'
              '  set_target_properties(cmark::cmark PROPERTIES\n'
              f'    IMPORTED_LOCATION "{lib}"\n'
              f'    IMPORTED_IMPLIB "{lib}"\n'
              f'    IMPORTED_LOCATION_RELEASE "{lib}"\n'
              f'    IMPORTED_IMPLIB_RELEASE "{lib}"\n'
              f'    INTERFACE_INCLUDE_DIRECTORIES "{inc}"\n'
              '  )\n'
              'endif()\n')
          open('/tmp/cmark_fix/cmark-config-version.cmake','w').write(
              'set(PACKAGE_VERSION "0.31.0")\n'
              'set(PACKAGE_VERSION_COMPATIBLE TRUE)\n'
              'set(PACKAGE_VERSION_EXACT TRUE)\n')
          print(f"cmark OK: {lib}")
          PYEOF

      - name: Configurar CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -Dcmark_DIR=/tmp/cmark_fix \
            -DLauncher_QT_VERSION_MAJOR=6 \
            -DENABLE_LTO=ON \
            -G Ninja

      - name: Compilar
        run: ninja -C build -j$(nproc)

      - name: Obtener version
        id: ver
        run: |
          VER=$(grep -oP 'Launcher_VERSION_NAME "\K[\d.]+' CMakeLists.txt | head -1)
          ARCH=$(uname -m)
          echo "pkgname=BetelineyLauncher-${VER}-Linux-${ARCH}" >> $GITHUB_OUTPUT
          echo "tarname=BetelineyLauncher-${VER}-Linux-${ARCH}.tar.gz" >> $GITHUB_OUTPUT

      - name: Empaquetar
        run: |
          PKG="${{ steps.ver.outputs.pkgname }}"
          STAGE="dist/stage/$PKG"
          mkdir -p "$STAGE/jars"
          cp build/beteliney "$STAGE/"
          find build/libraries -name "*.jar" -exec cp {} "$STAGE/jars/" \; 2>/dev/null || true
          find build/jars    -name "*.jar" -exec cp {} "$STAGE/jars/" \; 2>/dev/null || true
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\nexec "$DIR/beteliney" "$@"\n' > "$STAGE/run.sh"
          chmod +x "$STAGE/run.sh" "$STAGE/beteliney"
          tar -czf "dist/${{ steps.ver.outputs.tarname }}" -C dist/stage "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/${{ steps.ver.outputs.tarname }}

  # ─────────────────────────────────────────
  #  WINDOWS (msys2 + MinGW — sin aqtinstall)
  # ─────────────────────────────────────────
  build-windows:
    name: Windows (msys2 MinGW64)
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-networkauth
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-cmark
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-libxml2
            java-openjdk-devel

      - name: Configurar CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DLauncher_QT_VERSION_MAJOR=6 \
            -DENABLE_LTO=OFF \
            -G Ninja

      - name: Compilar
        run: ninja -C build -j$(nproc)

      - name: Obtener version
        id: ver
        run: |
          VER=$(grep -oP 'Launcher_VERSION_NAME "\K[\d.]+' CMakeLists.txt | head -1)
          echo "pkgname=BetelineyLauncher-${VER}-Windows-x64" >> $GITHUB_OUTPUT
          echo "zipname=BetelineyLauncher-${VER}-Windows-x64.zip" >> $GITHUB_OUTPUT

      - name: Empaquetar
        run: |
          PKG="${{ steps.ver.outputs.pkgname }}"
          mkdir -p "dist/$PKG/platforms" "dist/$PKG/tls" "dist/$PKG/imageformats" \
                   "dist/$PKG/iconengines" "dist/$PKG/styles" "dist/$PKG/jars"
          cp build/beteliney.exe "dist/$PKG/"
          find build/libraries -name "*.jar" -exec cp {} "dist/$PKG/jars/" \; 2>/dev/null || true
          find build/jars    -name "*.jar" -exec cp {} "dist/$PKG/jars/" \; 2>/dev/null || true
          # Qt plugins y DLLs
          QT_BIN=$(dirname $(which qmake6 2>/dev/null || which qmake))
          QT_PLUGINS=$(realpath "$QT_BIN/../share/qt6/plugins" 2>/dev/null || realpath "$QT_BIN/../plugins")
          cp "$QT_PLUGINS/platforms/qwindows.dll" "dist/$PKG/platforms/" 2>/dev/null || true
          cp "$QT_PLUGINS/tls/"*.dll               "dist/$PKG/tls/"       2>/dev/null || true
          cp "$QT_PLUGINS/imageformats/"*.dll       "dist/$PKG/imageformats/" 2>/dev/null || true
          cp "$QT_PLUGINS/iconengines/"*.dll        "dist/$PKG/iconengines/" 2>/dev/null || true
          # DLLs de dependencias
          for dll in Qt6Core Qt6Gui Qt6Widgets Qt6Network Qt6NetworkAuth Qt6Xml Qt6Concurrent Qt6OpenGL Qt6OpenGLWidgets Qt6Svg; do
            cp "$QT_BIN/${dll}.dll" "dist/$PKG/" 2>/dev/null || true
          done
          # Runtime MinGW y otras DLLs necesarias
          for dll in /mingw64/bin/libgcc_s_seh-1.dll /mingw64/bin/libstdc++-6.dll \
                     /mingw64/bin/libwinpthread-1.dll /mingw64/bin/libarchive*.dll \
                     /mingw64/bin/libcmark.dll /mingw64/bin/libqrencode*.dll \
                     /mingw64/bin/zlib1.dll /mingw64/bin/libzstd.dll \
                     /mingw64/bin/libbz2*.dll /mingw64/bin/liblzma*.dll \
                     /mingw64/bin/liblz4*.dll /mingw64/bin/libssl*.dll \
                     /mingw64/bin/libcrypto*.dll /mingw64/bin/libxml2*.dll \
                     /mingw64/bin/libiconv*.dll /mingw64/bin/libcharset*.dll; do
            cp "$dll" "dist/$PKG/" 2>/dev/null || true
          done
          cd dist && 7z a "${{ steps.ver.outputs.zipname }}" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/${{ steps.ver.outputs.zipname }}

  # ─────────────────────────────────────────
  #  RELEASE — solo en tags v*.*.*
  # ─────────────────────────────────────────
  release:
    name: Crear Release
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with: { name: linux-build,   path: artifacts/ }
      - uses: actions/download-artifact@v4
        with: { name: windows-build, path: artifacts/ }

      - uses: softprops/action-gh-release@v2
        with:
          name: "BetelineyLauncher ${{ github.ref_name }}"
          body: |
            ## BetelineyLauncher ${{ github.ref_name }}

            | Plataforma | Descarga | Instrucciones |
            |---|---|---|
            | **Windows 10/11** | `.zip` | Extraer → ejecutar `beteliney.exe` |
            | **Linux 64-bit** | `.tar.gz` | Extraer → ejecutar `bash run.sh` |

            Java es gestionado automáticamente por el launcher.
          files: artifacts/*
